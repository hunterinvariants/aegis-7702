name: two-way-proof
on: [push, pull_request, workflow_dispatch]

jobs:
  detectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install slither, solc, and the detector pack
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer==0.11.5 solc-select
          pip install -e .
          solc-select install 0.8.34
          solc-select use 0.8.34
      - name: Two-way corpus proof (7 detectors -- fire on bad, clean on safe)
        run: python tests/run_corpus.py

  harnesses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Dynamic exploit harnesses (forge test)
        run: forge test -vv
