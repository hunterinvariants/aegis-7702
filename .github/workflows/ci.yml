name: two-way-proof
on: [push, pull_request, workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  detectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install slither + the detector pack
        run: |
          python -m pip install --upgrade pip
          pip install slither-analyzer==0.11.5
          pip install -e .
          forge --version
          echo "eip7702 detectors registered: $(slither --list-detectors 2>/dev/null | grep -c eip7702)"
      - name: Two-way corpus proof (7 detectors -- fire on bad, clean on safe)
        run: python3 tests/run_corpus.py

  harnesses:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Dynamic exploit harnesses (forge test)
        run: forge test -vv
